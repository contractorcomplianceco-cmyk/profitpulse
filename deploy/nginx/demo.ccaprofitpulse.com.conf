# Profit Pulse — public demo + app host
# Domain: demo.ccaprofitpulse.com  (CNAME → ccaprofitpulse.com)
# Upstream: http://127.0.0.1:3010 (PM2 profitpulse → vite preview, localhost only)
#
# Install:
#   sudo ln -sf /home/ubuntu/projects/profitpulse/deploy/nginx/demo.ccaprofitpulse.com.conf \
#     /etc/nginx/sites-enabled/demo.ccaprofitpulse.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (after DNS resolves to this host):
#   sudo certbot --nginx -d demo.ccaprofitpulse.com
# Certbot adds :443 and HTTP→HTTPS redirect automatically.

server {
    server_name demo.ccaprofitpulse.com;

    client_max_body_size 25m;

    # Let's Encrypt HTTP-01 validation
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    # Public demo walkthrough — same upstream; SPA handles /demo → /#/demo
    location /demo {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        internal;
        rewrite ^ /index.html break;
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\. {
        deny all;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/demo.ccaprofitpulse.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/demo.ccaprofitpulse.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = demo.ccaprofitpulse.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name demo.ccaprofitpulse.com;
    return 404; # managed by Certbot


}