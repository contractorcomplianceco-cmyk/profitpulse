kind = "video"
previewPath = "/demo-preview/"
title = "HealthCast Product Walkthrough"
version = "1.0.0"
id = "artifacts/healthcast-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/demo-preview/" ]
localPort = 19446

[services.development]
run = "pnpm --filter @workspace/healthcast-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthcast-demo", "run", "build" ]
publicDir = "artifacts/healthcast-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19446"
BASE_PATH = "/demo-preview/"
