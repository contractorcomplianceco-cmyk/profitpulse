kind = "web"
previewPath = "/"
title = "CCA HealthCast OS"
version = "1.0.0"
id = "artifacts/healthcast"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19324

[services.development]
run = "pnpm --filter @workspace/healthcast run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/healthcast", "run", "build" ]
publicDir = "artifacts/healthcast/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19324"
BASE_PATH = "/"
